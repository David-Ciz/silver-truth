stages:

  # 1. Thesis Fold 1 (Train 01 / Test 02)
  # Generates dataset dataframe with 'split' column configured for Fold 1.
  create_fold1:
    foreach:
      - BF-C2DL-HSC
      - BF-C2DL-MuSC
    do:
      cmd: silver-preprocessing create-dataset-dataframe data/synchronized_data/${item} --output_path data/dataframes/${item}/whole_image/${item}_split_fold-1.parquet --split-mode fold-1 --split-ratios "80,20"
      deps:
        - data/synchronized_data/${item}
        - src/silver_truth/cli/preprocessing.py
        - src/silver_truth/data_processing/utils/dataset_dataframe_creation.py
      outs:
        - data/dataframes/${item}/whole_image/${item}_split_fold-1.parquet

  # 2. Thesis Fold 2 (Train 02 / Test 01)
  # Generates dataset dataframe with 'split' column configured for Fold 2.
  create_fold2:
    foreach:
      - BF-C2DL-HSC
      - BF-C2DL-MuSC
    do:
      cmd: silver-preprocessing create-dataset-dataframe data/synchronized_data/${item} --output_path data/dataframes/${item}/whole_image/${item}_split_fold-2.parquet --split-mode fold-2 --split-ratios "80,20"
      deps:
        - data/synchronized_data/${item}
        - src/silver_truth/cli/preprocessing.py
        - src/silver_truth/data_processing/utils/dataset_dataframe_creation.py
      outs:
        - data/dataframes/${item}/whole_image/${item}_split_fold-2.parquet

  # 3. Mixed Split (For Silver Truth Provider)
  # Generates dataset dataframe with 'split' column configured for Mixed Stratified Split.
  create_mixed:
    foreach:
      - BF-C2DL-HSC
      - BF-C2DL-MuSC
    do:
      cmd: silver-preprocessing create-dataset-dataframe data/synchronized_data/${item} --output_path data/dataframes/${item}/whole_image/${item}_split_mixed.parquet --split-mode mixed --split-ratios "70,15,15"
      deps:
        - data/synchronized_data/${item}
        - src/silver_truth/cli/preprocessing.py
        - src/silver_truth/data_processing/utils/dataset_dataframe_creation.py
      outs:
        - data/dataframes/${item}/whole_image/${item}_split_mixed.parquet

  create_qa_crops_base:
    # Generate QA crops once per dataset/crop-size (split-independent).
    foreach: ${datasets}
    do:
      cmd: >
        silver-qa create-dataset 
        --dataset-dataframe-path data/dataframes/${key}/whole_image/${key}_split_mixed.parquet 
        --output-dir data/qa_crops/${key}/sz${item.crop_size}/ 
        --output-parquet-path data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet 
        --crop
        --crop-size ${item.crop_size}

      deps:
        - data/dataframes/${key}/whole_image/${key}_split_mixed.parquet
        - src/silver_truth/cli/qa.py
        - src/silver_truth/qa/preprocessing.py

      params:
        - datasets.${key}.crop_size

      outs:
        - data/qa_crops/${key}/sz${item.crop_size}/
        - data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet

  create_qa_crops_split_mixed:
    foreach: ${datasets}
    do:
      cmd: >
        silver-qa attach-split
        --qa-base-parquet data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        --dataset-dataframe-path data/dataframes/${key}/whole_image/${key}_split_mixed.parquet
        --output-parquet-path data/dataframes/${key}/qa_crops/mixed_sz${item.crop_size}_qa_dataset.parquet
      deps:
        - data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        - data/dataframes/${key}/whole_image/${key}_split_mixed.parquet
        - src/silver_truth/cli/qa.py
        - src/silver_truth/qa/preprocessing.py
      params:
        - datasets.${key}.crop_size
      outs:
        - data/dataframes/${key}/qa_crops/mixed_sz${item.crop_size}_qa_dataset.parquet

  create_qa_crops_split_fold1:
    foreach: ${datasets}
    do:
      cmd: >
        silver-qa attach-split
        --qa-base-parquet data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        --dataset-dataframe-path data/dataframes/${key}/whole_image/${key}_split_fold-1.parquet
        --output-parquet-path data/dataframes/${key}/qa_crops/fold-1_sz${item.crop_size}_qa_dataset.parquet
      deps:
        - data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        - data/dataframes/${key}/whole_image/${key}_split_fold-1.parquet
        - src/silver_truth/cli/qa.py
        - src/silver_truth/qa/preprocessing.py
      params:
        - datasets.${key}.crop_size
      outs:
        - data/dataframes/${key}/qa_crops/fold-1_sz${item.crop_size}_qa_dataset.parquet

  create_qa_crops_split_fold2:
    foreach: ${datasets}
    do:
      cmd: >
        silver-qa attach-split
        --qa-base-parquet data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        --dataset-dataframe-path data/dataframes/${key}/whole_image/${key}_split_fold-2.parquet
        --output-parquet-path data/dataframes/${key}/qa_crops/fold-2_sz${item.crop_size}_qa_dataset.parquet
      deps:
        - data/dataframes/${key}/qa_crops/base_sz${item.crop_size}_qa_dataset.parquet
        - data/dataframes/${key}/whole_image/${key}_split_fold-2.parquet
        - src/silver_truth/cli/qa.py
        - src/silver_truth/qa/preprocessing.py
      params:
        - datasets.${key}.crop_size
      outs:
        - data/dataframes/${key}/qa_crops/fold-2_sz${item.crop_size}_qa_dataset.parquet

  # Build baseline (non-QA-gated) Ensemble databank from mixed QA crops.
  create_ensemble_databank_c1_hsc_mixed:
    cmd: >
      silver-ensemble build-databank
      --dataset-name BF-C2DL-HSC
      --qa-parquet-path data/dataframes/BF-C2DL-HSC/qa_crops/mixed_sz${datasets.BF-C2DL-HSC.crop_size}_qa_dataset.parquet
      --version C1
      --crop-size ${datasets.BF-C2DL-HSC.crop_size}
      --split-seed 42
      --split-sets "0.7,0.15,0.15"
    deps:
      - data/dataframes/BF-C2DL-HSC/qa_crops/mixed_sz${datasets.BF-C2DL-HSC.crop_size}_qa_dataset.parquet
      - src/silver_truth/cli/ensemble.py
      - src/silver_truth/ensemble/ensemble.py
      - src/silver_truth/ensemble/databanks_builds.py
      - src/silver_truth/ensemble/utils.py
      - src/silver_truth/data_processing/utils/parquet_utils.py
    params:
      - datasets.BF-C2DL-HSC.crop_size
    outs:
      - data/ensemble_data/databanks/C1_ds1-42-7015_QA--/
      - data/ensemble_data/databanks/C1_ds1-42-7015_QA--.parquet

  # ==========================================================================
  # Fusion Pipeline Stages
  # ==========================================================================
  # Note: CNN training/evaluation are NOT included in DVC because they are
  # experimental in nature (hyperparameter tuning, model selection).
  # Use MLflow for experiment tracking instead:
  #   python cnn.py train --mlflow-experiment "cnn-jaccard" [OPTIONS]
  #
  # For fusion experiments comparing different strategies, use:
  #   python scripts/run_fusion_experiment.py --help
  # ==========================================================================

  # Generate job files for fusion - Mixed Split
  generate_job_files_mixed:
    foreach:
      - dataset: BF-C2DL-HSC
        campaign: "01"
      - dataset: BF-C2DL-HSC
        campaign: "02"
    do:
      cmd: >
        silver-fusion generate-jobfiles
        --parquet-file data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_mixed.parquet
        --campaign-number ${item.campaign}
        --output-dir data/job_files/${item.dataset}/mixed
      deps:
        - data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_mixed.parquet
        - src/silver_truth/cli/fusion.py
        - src/silver_truth/job_file_generator.py
      outs:
        - data/job_files/${item.dataset}/mixed/${item.dataset}_${item.campaign}_job_file.txt

  # Generate job files for fusion - Fold 1 (Train 01 / Test 02)
  generate_job_files_fold1:
    foreach:
      - dataset: BF-C2DL-HSC
        campaign: "01"
      - dataset: BF-C2DL-HSC
        campaign: "02"
    do:
      cmd: >
        silver-fusion generate-jobfiles
        --parquet-file data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_fold-1.parquet
        --campaign-number ${item.campaign}
        --output-dir data/job_files/${item.dataset}/fold-1
      deps:
        - data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_fold-1.parquet
        - src/silver_truth/cli/fusion.py
        - src/silver_truth/job_file_generator.py
      outs:
        - data/job_files/${item.dataset}/fold-1/${item.dataset}_${item.campaign}_job_file.txt

  # Generate job files for fusion - Fold 2 (Train 02 / Test 01)
  generate_job_files_fold2:
    foreach:
      - dataset: BF-C2DL-HSC
        campaign: "01"
      - dataset: BF-C2DL-HSC
        campaign: "02"
    do:
      cmd: >
        silver-fusion generate-jobfiles
        --parquet-file data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_fold-2.parquet
        --campaign-number ${item.campaign}
        --output-dir data/job_files/${item.dataset}/fold-2
      deps:
        - data/dataframes/${item.dataset}/whole_image/${item.dataset}_split_fold-2.parquet
        - src/silver_truth/cli/fusion.py
        - src/silver_truth/job_file_generator.py
      outs:
        - data/job_files/${item.dataset}/fold-2/${item.dataset}_${item.campaign}_job_file.txt
